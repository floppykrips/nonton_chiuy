<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nonton Film Cihuy 🎬</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav>
    <a href="#" class="nav-logo" onclick="navigate('beranda')">NONTON<span>CIHUY</span></a>
    <ul class="nav-links">
      <li><a href="#" data-page="beranda"  class="active" onclick="navigate('beranda')">Beranda</a></li>
      <li><a href="#" data-page="trending"           onclick="navigate('trending')">Trending</a></li>
      <li><a href="#" data-page="terbaru"            onclick="navigate('terbaru')">Terbaru</a></li>
      <li><a href="#" data-page="serial"             onclick="navigate('serial')">Serial</a></li>
    </ul>
    <div class="nav-search">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Cari film..."/>
    </div>
  </nav>

  <!-- ── PAGE CONTAINER ── -->
  <div id="app"></div>

  <!-- ── MODAL ── -->
  <div class="modal-backdrop" id="modal" onclick="closeModalOutside(event)">
    <div class="modal" id="modalBox">
      <div class="modal-video-wrap" id="modalVideoWrap">
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta" id="modalMeta"></div>
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-primary" id="modalWatchBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
            Tonton
          </button>
          <button class="modal-btn modal-btn-secondary" onclick="closeModal()">✕ Tutup</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
